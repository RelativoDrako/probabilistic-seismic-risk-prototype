<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Probabilistic Seismic Risk Prototype</title>
  <desc id="desc">Trustworthy systems under uncertainty, local-first, bounded, and governance-aligned.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"></stop>
      <stop offset="55%" stop-color="#0b1220"></stop>
      <stop offset="100%" stop-color="#111827"></stop>
    </linearGradient>

    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"></stop>
      <stop offset="50%" stop-color="#3b82f6"></stop>
      <stop offset="100%" stop-color="#a855f7"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"></rect>

  <g opacity="0.08">
    <path d="M0 40 H1200 M0 80 H1200 M0 120 H1200 M0 160 H1200 M0 200 H1200 M0 240 H1200 M0 280 H1200" stroke="#ffffff"></path>
    <path d="M100 0 V320 M200 0 V320 M300 0 V320 M400 0 V320 M500 0 V320 M600 0 V320 M700 0 V320 M800 0 V320 M900 0 V320 M1000 0 V320 M1100 0 V320" stroke="#ffffff"></path>
  </g>

  <path d="M0 188
           C100 145, 200 225, 300 188
           C400 145, 500 225, 600 188
           C700 145, 800 225, 900 188
           C1000 145, 1100 225, 1200 188" fill="none" stroke="url(#wave)" stroke-width="3.5" filter="url(#glow)"></path>

  <circle cx="970" cy="96" r="52" fill="none" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="2"></circle>
  <circle cx="1018" cy="132" r="28" fill="none" stroke="#22c55e" stroke-opacity="0.35" stroke-width="2"></circle>
  <circle cx="1068" cy="88" r="38" fill="none" stroke="#a855f7" stroke-opacity="0.35" stroke-width="2"></circle>

  <text x="60" y="105" fill="#f8fafc" font-size="32" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Probabilistic Seismic Risk Prototype
  </text>

  <text x="60" y="146" fill="#cbd5e1" font-size="17" font-family="Arial, Helvetica, sans-serif">
    Trustworthy Systems Under Uncertainty · Local-First · Governance-Aligned
  </text>

  <text x="60" y="208" fill="#93c5fd" font-size="14" font-family="Arial, Helvetica, sans-serif" letter-spacing="2">
    TRACEABILITY · BOUNDED INTERPRETATION · INSPECTION-FIRST DESIGN
  </text>

  <rect x="60" y="236" width="165" height="34" rx="17" fill="#0f172a" stroke="#22c55e" stroke-opacity="0.55"></rect>
  <text x="142" y="258" text-anchor="middle" fill="#d1fae5" font-size="13" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Local-first
  </text>

  <rect x="242" y="236" width="185" height="34" rx="17" fill="#0f172a" stroke="#3b82f6" stroke-opacity="0.55"></rect>
  <text x="334" y="258" text-anchor="middle" fill="#dbeafe" font-size="13" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    SQLite authority
  </text>

  <rect x="444" y="236" width="220" height="34" rx="17" fill="#0f172a" stroke="#a855f7" stroke-opacity="0.55"></rect>
  <text x="554" y="258" text-anchor="middle" fill="#f3e8ff" font-size="13" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Explicit non-claims
  </text>
</svg>