<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="660" viewBox="0 0 1600 660" role="img" aria-label="PSRP ingestion and treatment traceability cycle">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#17233a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity=".42"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
    <style>
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:38px;font-weight:800;fill:#f8fafc;letter-spacing:-.02em}
      .subtitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#cbd5e1}
      .stage-title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;font-weight:800;fill:#f8fafc}
      .stage-copy{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;fill:#cbd5e1}
      .badge{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:800;fill:#93c5fd;letter-spacing:.08em}
      .boundary{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;fill:#fbbf24;font-weight:700}
      .line{stroke:#60a5fa;stroke-width:3;fill:none;marker-end:url(#arrow);opacity:.9}
      .mutedline{stroke:#334155;stroke-width:2;fill:none;stroke-dasharray:6 8}
    </style>
  </defs>
  <rect width="1600" height="660" rx="34" fill="url(#bg)"/>
  <circle cx="1340" cy="92" r="250" fill="#1d4ed8" opacity=".09"/>
  <circle cx="205" cy="585" r="260" fill="#10b981" opacity=".08"/>

  <text x="70" y="78" class="title">Methodology &amp; Traceability Cycle</text>
  <text x="70" y="112" class="subtitle">Local-first lineage from immutable evidence to bounded publication surface — not an official warning system.</text>

  <g transform="translate(62 172)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="210" height="132" rx="24" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="32" class="badge">01 SOURCE</text>
      <text x="24" y="68" class="stage-title">Raw evidence</text>
      <text x="24" y="96" class="stage-copy">Original dataset lineage</text>
      <text x="24" y="116" class="stage-copy">preserved as input truth</text>
    </g>
    <path d="M222 66 H302" class="line"/>

    <g transform="translate(314 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="210" height="132" rx="24" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="32" class="badge">02 QUALITY</text>
      <text x="24" y="68" class="stage-title">Validation</text>
      <text x="24" y="96" class="stage-copy">Schema, completeness,</text>
      <text x="24" y="116" class="stage-copy">normalization gates</text>
    </g>
    <path d="M536 66 H616" class="line"/>

    <g transform="translate(628 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="230" height="132" rx="24" fill="url(#card)" stroke="#22c55e"/>
      <text x="24" y="32" class="badge" fill="#86efac">03 AUTHORITY</text>
      <text x="24" y="68" class="stage-title">SQLite authority</text>
      <text x="24" y="96" class="stage-copy">Structured local source</text>
      <text x="24" y="116" class="stage-copy">for repeatable retrieval</text>
    </g>
    <path d="M870 66 H950" class="line"/>

    <g transform="translate(962 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="230" height="132" rx="24" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="32" class="badge">04 FEATURES</text>
      <text x="24" y="68" class="stage-title">Feature generation</text>
      <text x="24" y="96" class="stage-copy">Analytical variables for</text>
      <text x="24" y="116" class="stage-copy">bounded ML reading</text>
    </g>
    <path d="M1204 66 H1284" class="line"/>

    <g transform="translate(1296 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="210" height="132" rx="24" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="32" class="badge">05 REGIONAL</text>
      <text x="24" y="68" class="stage-title">Aggregation</text>
      <text x="24" y="96" class="stage-copy">Regional summaries and</text>
      <text x="24" y="116" class="stage-copy">concentration views</text>
    </g>
  </g>

  <path d="M1410 320 C1410 390 1260 406 1188 406" class="line"/>
  <g transform="translate(934 360)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="138" rx="24" fill="url(#card)" stroke="#f59e0b"/>
    <text x="24" y="34" class="badge" fill="#fcd34d">06 EVALUATION</text>
    <text x="24" y="72" class="stage-title">Model posture</text>
    <text x="24" y="101" class="stage-copy">Metrics, limits, and</text>
    <text x="24" y="121" class="stage-copy">publication-safe fallback</text>
  </g>
  <path d="M922 430 H774" class="line"/>

  <g transform="translate(510 360)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="138" rx="24" fill="url(#card)" stroke="#60a5fa"/>
    <text x="24" y="34" class="badge">07 SURFACE</text>
    <text x="24" y="72" class="stage-title">Publication layer</text>
    <text x="24" y="101" class="stage-copy">Executive maps, reports,</text>
    <text x="24" y="121" class="stage-copy">API and review artifacts</text>
  </g>
  <path d="M498 430 H350" class="line"/>

  <g transform="translate(86 360)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="138" rx="24" fill="url(#card)" stroke="#ef4444"/>
    <text x="24" y="34" class="badge" fill="#fecaca">08 BOUNDARY</text>
    <text x="24" y="72" class="stage-title">Executive review</text>
    <text x="24" y="101" class="stage-copy">Controlled communication</text>
    <text x="24" y="121" class="stage-copy">without official claims</text>
  </g>

  <path d="M206 358 C205 318 205 312 205 306" class="mutedline"/>
  <text x="70" y="570" class="boundary">Boundary rule: descriptive probabilistic prototype only. No deterministic earthquake prediction. No official warning semantics.</text>
</svg>