<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-label="Prototype traceability pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07101f"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.28"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#93c5fd"/></marker>
    <style>
      .title{font:800 48px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}.sub{font:400 21px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}.num{font:800 18px 'Segoe UI',Arial,sans-serif;fill:#0f172a}.label{font:800 28px 'Segoe UI',Arial,sans-serif;fill:#0f172a}.small{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#334155}.foot{font:650 20px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}.arrow{stroke:#93c5fd;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="820" rx="34" fill="url(#bg)"/>
  <circle cx="1420" cy="95" r="190" fill="#1d4ed8" opacity=".14"/>
  <circle cx="180" cy="720" r="220" fill="#059669" opacity=".10"/>
  <text x="72" y="82" class="title">Prototype Traceability Pipeline</text>
  <text x="72" y="122" class="sub">Curated evidence becomes structured authority, derived features, publication artifacts, and a controlled executive surface.</text>
  <g filter="url(#shadow)">
    <rect x="80" y="210" width="270" height="150" rx="24" fill="#dbeafe"/>
    <circle cx="118" cy="246" r="18" fill="#1d4ed8"/><text x="113" y="253" class="num" fill="#fff">1</text>
    <text x="118" y="294" class="label">Raw evidence</text>
    <text x="118" y="328" class="small">Immutable seismic inputs</text>

    <rect x="440" y="210" width="285" height="150" rx="24" fill="#dcfce7"/>
    <circle cx="478" cy="246" r="18" fill="#059669"/><text x="473" y="253" class="num" fill="#fff">2</text>
    <text x="478" y="294" class="label">SQLite authority</text>
    <text x="478" y="328" class="small">Structured prototype truth</text>

    <rect x="815" y="210" width="300" height="150" rx="24" fill="#fef3c7"/>
    <circle cx="853" cy="246" r="18" fill="#d97706"/><text x="848" y="253" class="num" fill="#fff">3</text>
    <text x="853" y="294" class="label">Feature stages</text>
    <text x="853" y="328" class="small">Bounded analytical context</text>

    <rect x="1205" y="210" width="315" height="150" rx="24" fill="#f3e8ff"/>
    <circle cx="1243" cy="246" r="18" fill="#7c3aed"/><text x="1238" y="253" class="num" fill="#fff">4</text>
    <text x="1243" y="294" class="label">Publication artifacts</text>
    <text x="1243" y="328" class="small">Reports, plots, maps, views</text>

    <rect x="505" y="520" width="590" height="150" rx="28" fill="#bfdbfe"/>
    <circle cx="548" cy="558" r="18" fill="#2563eb"/><text x="543" y="565" class="num" fill="#fff">5</text>
    <text x="548" y="606" class="label">Executive web surface</text>
    <text x="548" y="640" class="small">Controlled reading, explicit boundaries, relative paths</text>
  </g>
  <path d="M350 285 L440 285" class="arrow"/>
  <path d="M725 285 L815 285" class="arrow"/>
  <path d="M1115 285 L1205 285" class="arrow"/>
  <path d="M582 360 C590 430 650 475 725 520" class="arrow"/>
  <path d="M965 360 C965 430 920 475 860 520" class="arrow"/>
  <path d="M1360 360 C1280 450 1160 490 1045 520" class="arrow"/>
  <text x="72" y="752" class="foot">Design rule: every public claim must be supported by persisted evidence or stated as a bounded limitation.</text>
</svg>
